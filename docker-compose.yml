# ============================================
# VOLUMES
# ============================================

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  milvus_data:
    driver: local

# ============================================
# NETWORKS
# ============================================

networks:
  p3-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

